name: P0 Reproducibility

on:
  push:
    branches:
      - main
      - sprint1-p0-reproducibility
  pull_request:
    branches:
      - main

jobs:
  hygiene:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SecondBrain-Agent
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Repo doctor
        run: python launcher.py repo-doctor --execute-runtime-checks

      - name: Dependency inventory
        run: python launcher.py dependency-inventory

      - name: Focused hygiene tests
        run: |
          pytest -q tests/test_repo_doctor_v18_7.py
          pytest -q tests/test_dependency_inventory_v18_8.py
